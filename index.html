<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="theme-switch">
            <button id="theme-toggle" title="Toggle Dark/Light Mode">
                <i class="fas fa-moon"></i>
            </button>
        </div>
        <header>
            <h1><i class="fas fa-star"></i> Lotto Number Generator</h1>
        </header>
        <main>
            <div class="lotto-numbers" id="lotto-numbers"></div>
            <button id="generate-btn"><i class="fas fa-magic"></i> Generate Numbers</button>
            
            <div class="contact-section">
                <hr>
                <h3><i class="fas fa-envelope"></i> 제휴 문의</h3>
                <form action="https://formspree.io/f/maqpdjvo" method="POST" id="contact-form">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="성함" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" placeholder="이메일" required>
                    </div>
                    <div class="form-group">
                        <textarea name="message" placeholder="문의 내용" rows="4" required></textarea>
                    </div>
                    <button type="submit" id="submit-btn">문의 보내기</button>
                </form>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
